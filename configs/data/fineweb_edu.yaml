# FineWeb-Edu streaming pipeline config — 1B tokens from sample-10BT

data:
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config: sample-10BT
  split: train
  tokenizer: gpt2
  max_tokens: 1_000_000_000
  min_doc_tokens: 50
  max_doc_tokens: 10_000
  tokens_per_shard: 10_000_000
  output_dir: data/processed/fineweb-edu
