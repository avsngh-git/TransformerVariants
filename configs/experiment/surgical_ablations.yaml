schema_version: 1
experiment_id: surgical_ablations_250m_3seed
description: >-
  Secondary one-factor Modern-backbone counterfactuals. This manifest is launched
  only after the primary matrix is stable; Modern step-3750 validation records from
  the primary study are the reference and are not retrained here.

data_dir: data/processed/fineweb-1B
dataset_manifest: data/processed/fineweb-1B/manifest.json
dataset_inventory: reports/data/fineweb_1b_sha256.json
scale: main
variants: [modern_abspos, modern_layernorm, modern_gelu]
seeds: [42, 137, 2024]

training:
  max_steps: 3750
  target_tokens_per_run: 245760000
  sequence_length: 1024
  micro_batch_size: 8
  grad_accum_steps: 8
  max_lr: 0.0003
  min_lr: 0.00003
  warmup_steps: 250
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  dtype: bfloat16
  eval_interval: 250
  eval_steps: 20
  checkpoint_interval: 1250
  log_interval: 10
  max_skipped_steps: 0

fault_tolerance:
  enabled: true
  checkpoint_ring_size: 3
  resume_latest_verified: true

variant_overrides:
  modern_abspos: {compile: true}
  modern_layernorm: {compile: true}
  modern_gelu: {compile: true}

analysis:
  reference_variant: modern
  reference_step: 3750
  reference_source: primary metrics.jsonl evaluation record
  comparison_design: paired_by_literal_seed
  warning: marginal effects depend on the Modern backbone and interaction order

output:
  run_template: runs/surgical_ablations_250m/{variant}_s{seed}
  checkpoint_template: runs/surgical_ablations_250m/{variant}_s{seed}/checkpoints
  resolved_manifest: reports/surgical_ablations_250m/resolved_manifest.json
  report_dir: reports/surgical_ablations_250m
