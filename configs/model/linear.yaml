# V5: Causal Linear Attention (ELU+1 feature map)
# RoPE, RMSNorm, SwiGLU, O(n * d_head^2) attention

model:
  variant: linear
  variant_id: V5
  norm_type: rmsnorm
  position_encoding: rope
  ffn_type: swiglu
  attention_type: linear

  vocab_size: 50257
  dropout: 0.0
  bias: false
  tie_embeddings: true

  debug:
    n_layer: 4
    d_model: 256
    n_head: 4
    seq_len: 512

  main:
    n_layer: 8
    d_model: 512
    n_head: 8
    seq_len: 1024

  stretch:
    n_layer: 12
    d_model: 768
    n_head: 12
    seq_len: 1024
