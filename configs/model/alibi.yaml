# V2: ALiBi (Attention with Linear Biases)
# No RoPE — per-head linear position biases via flash_attn native support

model:
  variant: alibi
  variant_id: V2
  norm_type: rmsnorm
  position_encoding: alibi
  ffn_type: swiglu
  attention_type: flash_alibi

  # Compute optimization
  attention_backend: flash_attn

  vocab_size: 50257
  ffn_multiplier: 4
  dropout: 0.0
  bias: false
  tie_embeddings: true

  debug:
    n_layer: 4
    d_model: 256
    n_head: 4
    seq_len: 512

  main:
    n_layer: 8
    d_model: 512
    n_head: 8
    seq_len: 1024

  stretch:
    n_layer: 12
    d_model: 768
    n_head: 12
    seq_len: 1024
