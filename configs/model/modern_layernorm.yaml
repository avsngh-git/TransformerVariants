# Surgical ablation: Modern backbone with LayerNorm instead of RMSNorm.
model:
  variant: modern_layernorm
  study_role: secondary_counterfactual
  norm_type: layernorm
  position_encoding: rope
  ffn_type: swiglu
  attention_type: flash_sdpa
  attention_backend: sdpa
  vocab_size: 50257
  dropout: 0.0
  bias: false
  tie_embeddings: true
  activation: swiglu

  debug: {n_layer: 4, d_model: 256, n_head: 4, seq_len: 512}
  main: {n_layer: 8, d_model: 512, n_head: 8, seq_len: 1024}
  stretch: {n_layer: 12, d_model: 768, n_head: 12, seq_len: 1024}
