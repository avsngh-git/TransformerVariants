# Main training config for NVIDIA L4-24Q GPU
#
# Designed for ~50M parameter models at seq_len=1024.
# Effective batch = micro_batch(8) × grad_accum(8) × seq_len(1024) = 65,536 tokens/step
#
# Token budget: 200M tokens (adjustable per experiment)
# Estimated wall-clock: ~3-4 hours per run at ~15k tokens/sec

training:
  # Token budget
  max_tokens: 200_000_000

  # Batch size
  micro_batch_size: 8
  grad_accum_steps: 8
  # effective_batch_tokens: 65536  (computed: 8 × 8 × 1024)

  # Optimizer
  optimizer: adamw
  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5   # 10% of peak LR
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  # Schedule
  lr_schedule: cosine
  warmup_tokens: 5_000_000    # ~76 steps

  # Precision
  precision: bf16
  activation_checkpointing: false  # not needed at 50M scale on 24GB

  # Logging and evaluation
  log_interval_steps: 10
  eval_interval_tokens: 10_000_000
  eval_max_batches: 50

  # Checkpointing
  checkpoint_interval_tokens: 50_000_000
  keep_last_n: 3
  keep_best: true

  # Reproducibility
  seed: 1
  deterministic: false  # true hurts performance; use for debugging only

  # Hardware
  compile_model: true   # torch.compile for speed
  num_workers: 4        # dataloader workers
